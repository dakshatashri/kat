<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPRCAS Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-container{
            background:white;
            width:350px;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            text-align:center;
        }

        .logo{
            width:180px;
            margin-bottom:20px;
        }

        h2{
            color:#1e3c72;
            margin-bottom:20px;
        }

        .input-box{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        .login-btn{
            width:100%;
            padding:12px;
            background:#1e3c72;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#2a5298;
        }

        .footer{
            margin-top:15px;
            font-size:14px;
            color:#666;
        }

        a{
            text-decoration:none;
            color:#1e3c72;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <img src="kprcas-logo.png" alt="KPRCAS Logo" class="logo">

        <h2>Student Login</h2>

        <form>
            <input type="text" class="input-box" placeholder="Username" required>
            <input type="password" class="input-box" placeholder="Password" required>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="footer">
            <p><a href="#">Forgot Password?</a></p>
        </div>
    </div>

</body>
</html>
